name: Deploy Fuzzer

permissions:
  contents: write
  actions: read

on:
  workflow_dispatch:

jobs:
  fuzzer-network:
    uses: ./.github/workflows/deploy-component.yml@dev
    with:
      env: fuzzer
      component: network
    secrets: inherit

  fuzzer-compute:
    needs: fuzzer-network
    uses: ./.github/workflows/deploy-component.yml@dev
    with:
      env: fuzzer
      component: compute
    secrets: inherit
